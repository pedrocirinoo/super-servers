<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Em breve — Super Servers</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #0066cc;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --micro: #86868b;
      --light: #f5f5f7;
      --border: #d2d2d7;
      --white: #ffffff;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--white);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
      text-align: center;
    }

    .logo {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 64px;
      text-decoration: none;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--blue);
      background: #e8f0fb;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.05;
      color: var(--text);
      margin-bottom: 20px;
    }

    h1 span {
      color: var(--blue);
    }

    p {
      font-size: 17px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 440px;
      margin: 0 auto 48px;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 500;
      color: var(--blue);
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .back:hover { opacity: 0.7; }

    .back svg {
      width: 16px;
      height: 16px;
      transition: transform 0.15s;
    }

    .back:hover svg { transform: translateX(-3px); }

    .dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 64px;
    }

    .dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
      animation: pulse 1.4s ease-in-out infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(1); }
      40% { opacity: 1; transform: scale(1.3); }
    }
  </style>
</head>
<body>

  <span class="logo">Super Servers</span>

  <div class="badge">Em breve</div>

  <h1>Novidades<br>a caminho<span>.</span></h1>

  <p>Estamos preparando algo novo. Fique de olho — em breve você vai saber de tudo.</p>

  <div class="dots">
    <span></span>
    <span></span>
    <span></span>
  </div>


</body>
</html>
